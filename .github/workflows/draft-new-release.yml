name: 'Create Draft Release'

on:
  workflow_dispatch:
    inputs:
      branch_type:
        type: choice
        description: 'The branch type you want to make'
        required: true
        options:
          - release
          - hotfix
        default: 'release'
      version:
        type: string
        description: 'Version number (e.g., 1.0.0)'
        required: true

jobs:
  draft-new-release:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Create Draft Release
        id: draft-release
        uses: release-drafter/release-drafter@v6
        with:
          publish: false
          config-name: release-drafter-config.yml
          version: ${{ inputs.version }}
          tag: v${{ inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release branch
        run: |
          git config user.name "HIBICanvas"
          git config user.email "devsepnine@hotmail.com"
          git checkout -b ${{ inputs.branch_type }}/${{ inputs.version }}
          git push origin ${{ inputs.branch_type }}/${{ inputs.version }}

      - name: Create pull request to master
        uses: thomaseizinger/create-pull-request@1.3.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          head: ${{ inputs.branch_type }}/${{ inputs.version }}
          base: master
          title: 'Release v${{ inputs.version }}'
          body: |
            ## Release v${{ inputs.version }}

            This PR was created by workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ### Release Notes
            ${{ steps.draft-release.outputs.body }}

            **Merging this PR will:**
            - Trigger Woodpecker CI build and deployment
            - Update the draft release (ready to publish)
