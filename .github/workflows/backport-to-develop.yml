name: 'Backport to Develop'

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  backport:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if develop exists
        id: check-develop
        run: |
          if git ls-remote --heads origin develop | grep -q develop; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR to develop
        if: steps.check-develop.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if PR already exists
          EXISTING_PR=$(gh pr list --base develop --head master --state open --json number --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists: #$EXISTING_PR"
            exit 0
          fi

          # Create new PR
          gh pr create \
            --base develop \
            --head master \
            --title "chore: Sync master changes to develop" \
            --body "## Backport from master

          This PR syncs changes from master back to develop.

          **Changes may include:**
          - Version updates
          - Release notes
          - Hotfixes merged to master

          **Auto-generated by:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || echo "No changes to sync or PR creation failed"
