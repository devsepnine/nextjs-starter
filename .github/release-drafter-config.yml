name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feat'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bug'
  - title: '🔧 Maintenance'
    labels:
      - 'chore'
      - 'refactor'
      - 'maintenance'
  - title: '📝 Documentation'
    labels:
      - 'docs'
  - title: '🎨 Styling'
    labels:
      - 'style'
  - title: '📦 Other Changes'
    labels:
      - '*'
change-template: '- $TITLE'
change-title-escapes: '\<*_&'
autolabeler:
  - label: 'feat'
    title:
      - '/^feat(\(.*\))?:/i'
  - label: 'fix'
    title:
      - '/^fix(\(.*\))?:/i'
  - label: 'chore'
    title:
      - '/^chore(\(.*\))?:/i'
  - label: 'refactor'
    title:
      - '/^refactor(\(.*\))?:/i'
  - label: 'docs'
    title:
      - '/^docs(\(.*\))?:/i'
  - label: 'style'
    title:
      - '/^style(\(.*\))?:/i'
template: |
  ## What's Changed

  $CHANGES
no-changes-template: 'No Change! 🐵'
version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
  patch:
    labels:
      - 'patch'
  default: patch
